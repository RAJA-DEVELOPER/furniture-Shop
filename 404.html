<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Lumière Home. The page you're looking for doesn't exist or has been moved." />
  <title>404 — Page Not Found | Lumière Home</title>
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/pages/pages.css" />
  <link rel="stylesheet" href="css/premium.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    body {
      min-height: 100vh;
      background: var(--warm-white);
      display: flex;
      flex-direction: column;
    }

    .error-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-6);
      position: relative;
      overflow: hidden;
    }

    /* Large decorative 404 background text */
    .error-bg-num {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-serif);
      font-size: clamp(180px, 30vw, 380px);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(176,141,87,0.12);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: -0.06em;
      white-space: nowrap;
    }

    /* Floating decorative elements */
    .error-float {
      position: absolute;
      border-radius: var(--radius-2xl);
      animation: float var(--duration) ease-in-out infinite alternate;
      opacity: 0.12;
    }

    .error-float--1 {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, var(--bronze), var(--walnut));
      top: 10%; left: 8%;
      --duration: 4s;
    }

    .error-float--2 {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, var(--olive), var(--sand));
      bottom: 15%; right: 10%;
      --duration: 5s;
    }

    .error-float--3 {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--walnut), var(--sand));
      top: 30%; right: 15%;
      --duration: 3.5s;
      border-radius: 50%;
    }

    /* Furniture silhouette */
    .error-furniture {
      width: 240px;
      margin: 0 auto var(--space-8);
      position: relative;
      z-index: 2;
      opacity: 0.3;
    }

    .error-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 600px;
    }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: rgba(176,141,87,0.12);
      border: 1px solid rgba(176,141,87,0.25);
      border-radius: var(--radius-full);
      padding: var(--space-2) var(--space-5);
      font-size: var(--fs-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bronze);
      margin-bottom: var(--space-6);
    }

    .error-title {
      font-family: var(--font-serif);
      font-size: clamp(var(--fs-3xl), 5vw, var(--fs-5xl));
      font-weight: 800;
      color: var(--charcoal);
      line-height: 1.1;
      margin-bottom: var(--space-4);
      letter-spacing: -0.02em;
    }

    .error-title em {
      font-style: italic;
      color: var(--bronze);
    }

    .error-subtitle {
      font-size: var(--fs-lg);
      color: var(--charcoal-soft);
      margin-bottom: var(--space-10);
      max-width: 46ch;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    .error-actions {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: var(--space-10);
    }

    /* Quick links */
    .error-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
      margin-top: var(--space-6);
    }

    .error-link-card {
      background: var(--pure-white);
      border: 1px solid var(--sand);
      border-radius: var(--radius-xl);
      padding: var(--space-4) var(--space-3);
      text-align: center;
      text-decoration: none;
      transition: all var(--transition-base);
      display: block;
    }

    .error-link-card:hover {
      border-color: var(--bronze);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .error-link-card__icon {
      font-size: 28px;
      display: block;
      margin-bottom: var(--space-2);
    }

    .error-link-card__label {
      font-size: var(--fs-xs);
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: 0.05em;
    }

    /* Search bar */
    .error-search {
      display: flex;
      max-width: 400px;
      margin: 0 auto var(--space-6);
      border: 1.5px solid var(--sand-dark);
      border-radius: var(--radius-full);
      overflow: hidden;
      background: var(--pure-white);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
    }

    .error-search:focus-within {
      border-color: var(--bronze);
      box-shadow: var(--shadow-md);
    }

    .error-search input {
      flex: 1;
      border: none;
      background: none;
      padding: var(--space-3) var(--space-5);
      font-family: var(--font-sans);
      font-size: var(--fs-sm);
      outline: none;
      color: var(--charcoal);
    }

    .error-search input::placeholder { color: var(--charcoal-soft); }

    .error-search button {
      background: var(--bronze);
      border: none;
      padding: var(--space-3) var(--space-5);
      cursor: pointer;
      color: white;
      transition: background var(--transition-fast);
    }

    .error-search button:hover { background: var(--walnut); }

    @media (max-width: 768px) {
      .error-links { grid-template-columns: repeat(2, 1fr); }
      .error-float--1, .error-float--2, .error-float--3 { display: none; }
    }

    @media (max-width: 480px) {
      .error-links { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="error-page" role="main">

  <!-- Decorative floating shapes -->
  <div class="error-float error-float--1" aria-hidden="true"></div>
  <div class="error-float error-float--2" aria-hidden="true"></div>
  <div class="error-float error-float--3" aria-hidden="true"></div>

  <!-- Large background 404 -->
  <div class="error-bg-num" aria-hidden="true">404</div>

  <div class="error-content">

    <!-- Furniture SVG silhouette -->
    <div class="error-furniture" aria-hidden="true">
      <svg viewBox="0 0 240 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Sofa base -->
        <rect x="20" y="70" width="200" height="45" rx="10" fill="var(--walnut)" opacity="0.6"/>
        <!-- Sofa back -->
        <rect x="20" y="40" width="200" height="38" rx="10" fill="var(--walnut)" opacity="0.4"/>
        <!-- Armrests -->
        <rect x="10" y="55" width="28" height="60" rx="8" fill="var(--walnut)" opacity="0.5"/>
        <rect x="202" y="55" width="28" height="60" rx="8" fill="var(--walnut)" opacity="0.5"/>
        <!-- Legs -->
        <rect x="32" y="115" width="12" height="20" rx="3" fill="var(--bronze)" opacity="0.6"/>
        <rect x="80" y="115" width="12" height="20" rx="3" fill="var(--bronze)" opacity="0.6"/>
        <rect x="148" y="115" width="12" height="20" rx="3" fill="var(--bronze)" opacity="0.6"/>
        <rect x="196" y="115" width="12" height="20" rx="3" fill="var(--bronze)" opacity="0.6"/>
        <!-- Cushions -->
        <rect x="26" y="72" width="90" height="38" rx="6" fill="var(--sand)" opacity="0.7"/>
        <rect x="124" y="72" width="90" height="38" rx="6" fill="var(--sand)" opacity="0.7"/>
        <!-- Question mark -->
        <text x="115" y="105" font-family="Georgia, serif" font-size="28" font-weight="700" fill="var(--bronze)" opacity="0.9" text-anchor="middle">?</text>
      </svg>
    </div>

    <div class="error-badge">✦ Error 404</div>

    <h1 class="error-title">
      This Room is <em>Empty</em>
    </h1>

    <p class="error-subtitle">
      The page you were looking for seems to have moved to a new address — much like furniture does when a space is redecorated. Let us help you find your way.
    </p>

    <!-- Search -->
    <div class="error-search" role="search">
      <input type="search" id="error-search-input" placeholder="Search for furniture, rooms…" aria-label="Search the site" />
      <button type="button" id="error-search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="error-actions">
      <a href="index.html" class="btn btn--primary btn--lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go Home
      </a>
      <button onclick="history.back()" class="btn btn--secondary btn--lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Go Back
      </button>
    </div>

    <!-- Quick navigation -->
    <p style="font-size: var(--fs-sm); color: var(--charcoal-soft); margin-bottom: var(--space-4);">Or jump to one of our popular sections:</p>
    <div class="error-links">
      <a href="gallery.html" class="error-link-card">
        <span class="error-link-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;width:100%;height:100%"><path d="M4 12V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v5"/><path d="M2 14v4h20v-4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><path d="M4 18v2"/><path d="M20 18v2"/></svg></span>
        <span class="error-link-card__label">Gallery</span>
      </a>
      <a href="home2.html" class="error-link-card">
        <span class="error-link-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;width:100%;height:100%"><path d="M12 2C13 5 14 7 16 8c-2 1-3 3-4 6-1-3-2-5-4-6 2-1 3-3 4-6"/><line x1="18" y1="14" x2="18" y2="20"/><line x1="15" y1="17" x2="21" y2="17"/></svg></span>
        <span class="error-link-card__label">Collections</span>
      </a>
      <a href="services.html" class="error-link-card">
        <span class="error-link-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;width:100%;height:100%"><circle cx="13.5" cy="6.5" r="2.5" stroke="none" fill="currentColor"/><circle cx="6" cy="13" r="2" stroke="none" fill="currentColor"/><circle cx="18" cy="16" r="2" stroke="none" fill="currentColor"/><path d="M16 4a4 4 0 0 0-8 0v4a4 4 0 0 0 8 0V4Z"/><path d="M4 16a5 5 0 0 0 10 0v-2"/><path d="M8 14v2a4 4 0 0 0 8 0"/></svg></span>
        <span class="error-link-card__label">Services</span>
      </a>
      <a href="contact.html" class="error-link-card">
        <span class="error-link-card__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;width:100%;height:100%"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span class="error-link-card__label">Contact</span>
      </a>
    </div>

  </div>
</div>

<script src="js/utils.js"></script>
<script>
/* ── Search redirect ── */
document.getElementById('error-search-btn')?.addEventListener('click', () => {
  const q = document.getElementById('error-search-input')?.value.trim();
  if (q) window.location.href = `gallery.html?search=${encodeURIComponent(q)}`;
});
document.getElementById('error-search-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) window.location.href = `gallery.html?search=${encodeURIComponent(q)}`;
  }
});

/* ── Animate elements in ── */
window.addEventListener('DOMContentLoaded', () => {
  document.querySelector('.error-content')?.style && (document.querySelector('.error-content').style.animation = 'fadeInUp 0.7s ease forwards');
});
</script>
</body>
</html>
